server:
  port: 8080
  servlet:
    context-path: ""

spring:
  application:
    name: recarding-dashboard-backend

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//drracx9-scan1:1552/TCMSPDB2}
    username: ${DB_USERNAME:EPICBACKENDSMARTVISTA2}
    password: ${DB_PASSWORD:EPICBACKENDSMARTVISTA2}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: RecardingDashboardHikariCP
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  # Control automatic execution of schema.sql / data.sql.
  # Set to 'always' to run schema scripts, or 'never' if the schema is already created in the DB.
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    org.springframework.security: INFO
    org.springframework.jdbc: DEBUG
    com.dfcc.dashboard: DEBUG
